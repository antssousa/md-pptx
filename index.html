<!DOCTYPE html>
<html class="dark" lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1326" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Syntax Gallery — MD → PPTX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <!-- ── Top App Bar ───────────────────────────────────────────────── -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-icon-btn" id="sidebar-toggle" title="Menu">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <span class="logo">Syntax Gallery</span>
      </div>

      <nav class="topbar-nav">
        <a href="#" class="topbar-link active">Editor</a>
        <a href="#" class="topbar-link">Templates</a>
        <a href="#" class="topbar-link">History</a>
      </nav>

      <div class="topbar-right">
        <label class="btn btn-ghost" title="Carregar template .pptx">
          <span class="material-symbols-outlined">upload_file</span>
          Template
          <input id="template-input" type="file" accept=".pptx" hidden />
        </label>
        <span id="template-name" class="template-badge" hidden></span>
        <button id="pdf-btn" class="btn btn-ghost" title="Exportar PDF">
          <span class="material-symbols-outlined">picture_as_pdf</span>
          PDF
        </button>
        <button id="download-btn" class="btn btn-primary" title="Exportar PPTX">
          <span class="material-symbols-outlined">download</span>
          Export
        </button>
      </div>
    </header>

    <!-- ── App body ──────────────────────────────────────────────────── -->
    <div class="app-body">

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-label">Gallery Workspace</div>
        <nav class="sidebar-nav">
          <a href="#" class="sidebar-item">
            <span class="material-symbols-outlined">folder_open</span>
            All Projects
          </a>
          <a href="#" class="sidebar-item">
            <span class="material-symbols-outlined">auto_awesome_motion</span>
            Templates
          </a>
          <a href="#" class="sidebar-item active">
            <span class="material-symbols-outlined">history</span>
            Recent Slides
          </a>
          <a href="#" class="sidebar-item">
            <span class="material-symbols-outlined">inventory_2</span>
            Archive
          </a>
        </nav>

        <div class="sidebar-section">
          <div class="sidebar-section-label">
            <span class="material-symbols-outlined">palette</span>
            Tema
          </div>
          <div class="theme-picker" id="theme-picker">
            <button class="theme-btn active" data-theme="dark-catppuccin">
              <span class="theme-swatch" style="background:#1e1e2e; border-color:#313244"></span>
              <span>Dark Catppuccin</span>
            </button>
            <button class="theme-btn" data-theme="corporate-clean">
              <span class="theme-swatch" style="background:#ffffff; border-color:#2563eb"></span>
              <span>Corporate Clean</span>
            </button>
            <button class="theme-btn" data-theme="minimal-light">
              <span class="theme-swatch" style="background:#fafafa; border-color:#d1d5db"></span>
              <span>Minimal Light</span>
            </button>
          </div>
        </div>
      </aside>

      <!-- Editor + Preview split -->
      <main class="workspace">

        <!-- ── Editor pane ── -->
        <section class="pane pane-editor" id="editor-pane">
          <div class="editor-toolbar">
            <button class="editor-tool" id="tool-bold"    title="Negrito (Ctrl+B)">
              <span class="material-symbols-outlined">format_bold</span>
            </button>
            <button class="editor-tool" id="tool-italic"  title="Itálico (Ctrl+I)">
              <span class="material-symbols-outlined">format_italic</span>
            </button>
            <button class="editor-tool" id="tool-heading" title="Título">
              <span class="material-symbols-outlined">title</span>
            </button>
            <div class="tool-sep"></div>
            <button class="editor-tool" id="tool-list"    title="Lista">
              <span class="material-symbols-outlined">format_list_bulleted</span>
            </button>
            <button class="editor-tool" id="tool-image"   title="Imagem">
              <span class="material-symbols-outlined">image</span>
            </button>
            <div class="tool-sep"></div>
            <div class="layout-dropdown" id="layout-dropdown">
              <button class="editor-tool layout-trigger" id="layout-btn" title="Inserir diretiva de layout">
                <span class="material-symbols-outlined">view_quilt</span>
                <span class="layout-label">Layout</span>
                <span class="material-symbols-outlined layout-arrow">expand_more</span>
              </button>
              <div class="layout-menu" id="layout-menu" hidden>
                <button class="layout-menu-item" data-layout="default">
                  <span class="material-symbols-outlined">crop_din</span>
                  Default
                </button>
                <button class="layout-menu-item" data-layout="two-column">
                  <span class="material-symbols-outlined">view_column</span>
                  Two-column
                </button>
                <button class="layout-menu-item" data-layout="blank">
                  <span class="material-symbols-outlined">check_box_outline_blank</span>
                  Blank
                </button>
                <button class="layout-menu-item" data-layout="title-only">
                  <span class="material-symbols-outlined">title</span>
                  Title only
                </button>
                <button class="layout-menu-item" data-layout="caption">
                  <span class="material-symbols-outlined">subtitles</span>
                  Caption
                </button>
                <div class="layout-menu-sep"></div>
                <button class="layout-menu-item" id="tool-col">
                  <span class="material-symbols-outlined">vertical_split</span>
                  Insert col break
                </button>
              </div>
            </div>
            <div class="tool-sep"></div>
            <button class="editor-tool" id="new-btn" title="Novo documento">
              <span class="material-symbols-outlined">add</span>
            </button>
            <label class="editor-tool" title="Importar arquivo .md">
              <span class="material-symbols-outlined">folder_open</span>
              <input id="import-input" type="file" accept=".md,.txt" hidden />
            </label>
            <button class="editor-tool" id="share-btn" title="Copiar link compartilhável">
              <span class="material-symbols-outlined">share</span>
            </button>
            <div class="tool-spacer"></div>
            <span id="save-status" class="save-status idle"></span>
            <span id="slide-count" class="badge">1 slide</span>
          </div>
          <div id="editor-mount"></div>
        </section>

        <!-- Resizer -->
        <div class="resizer" id="resizer" title="Arrastar para redimensionar"></div>

        <!-- ── Preview pane ── -->
        <section class="pane pane-preview" id="preview-pane">

          <!-- Floating top bar (badges) -->
          <div class="preview-top-bar">
            <div class="live-badge">
              <span class="live-dot"></span>
              Live Preview
            </div>
            <div class="preview-tags">
              <span class="preview-tag">16:9</span>
              <span class="preview-tag" id="theme-badge">Dark Catppuccin</span>
            </div>
          </div>

          <!-- Slide content -->
          <div id="preview-mount">
            <div class="preview-empty">
              <p>Escreva Markdown no editor ao lado.</p>
              <p>Use <code>---</code> para separar slides.</p>
            </div>
          </div>

          <!-- Floating bottom toolbar -->
          <div class="preview-floating-bar">
            <button id="prev-slide" class="float-btn" title="Slide anterior">
              <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <span id="slide-indicator" class="slide-counter">1 / 1</span>
            <button id="next-slide" class="float-btn" title="Próximo slide">
              <span class="material-symbols-outlined">chevron_right</span>
            </button>
            <div class="float-sep"></div>
            <button class="float-btn" id="btn-grid" title="Visão em grade">
              <span class="material-symbols-outlined">grid_view</span>
            </button>
            <button class="float-btn" id="btn-play" title="Apresentar">
              <span class="material-symbols-outlined">play_arrow</span>
            </button>
          </div>

        </section>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
